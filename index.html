<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loup-Garou</title>
  
  <!-- Import Horror/Bleeding Fonts from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap" rel="stylesheet">

  <style>
    /* Dark aesthetic for Werewolf theme */
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 90vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Home Header Container (Icon + Texts) */
    .home-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    /* Wolf Circle Container */
    .wolf-container {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 6px solid #e50914; /* Red Circle */
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a1a;
      box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); /* Soft Red Glow */
      overflow: hidden;
    }

    .wolf-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Primary Slogan */
    .slogan {
      margin-top: 15px;
      font-size: 24px;
      font-weight: bold;
      color: #e50914;
      text-shadow: 0 0 10px rgba(229, 9, 20, 0.6);
      letter-spacing: 1px;
    }

    /* Bleeding Red "Chez MADI" Font */
    .sub-slogan-bleeding {
      margin-top: 8px;
      font-family: 'Creepster', cursive;
      font-size: 28px;
      color: #e50914;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(229, 9, 20, 0.8), 2px 2px 4px #000000;
    }

    /* Main Red Button */
    .btn-red {
      width: 90%;
      max-width: 300px;
      padding: 18px;
      background-color: #e50914;
      color: white;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(229, 9, 20, 0.4);
      transition: transform 0.1s ease;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    .btn-red:active {
      transform: scale(0.96);
    }

    .btn-resume {
      width: 90%;
      max-width: 300px;
      padding: 18px;
      background-color: transparent;
      color: #28a745;
      font-size: 24px;
      font-weight: bold;
      border: 2px solid #28a745;
      border-radius: 12px;
      cursor: pointer;
      box-sizing: border-box;
      margin-bottom: 20px;
      text-align: center;
      transition: transform 0.1s ease, background-color 0.2s ease, color 0.2s ease;
    }

    .btn-resume:hover {
      background-color: #28a745;
      color: #121212;
    }

    .btn-resume:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>

  <!-- HOME HEADER -->
  <div class="home-header">
    <div class="wolf-container">
      <img src="wolf.png" alt="Wolf Icon" class="wolf-img">
    </div>
    <div class="slogan">(لي يشك يموت)</div>
    <div class="sub-slogan-bleeding">Chez MADI</div>
  </div>

  <!-- DIRECT LINK TO NAMES.HTML -->
  <a href="names.html" class="btn-red" onclick="startNewGame()">لعبة جديدة</a>
  <button id="resume-session-btn" class="btn-resume" type="button" style="display: none;">استئناف آخر جلسة</button>

  <script>
    const lastPageKey = 'loupGarouLastClosedPage';
    const resumeButton = document.getElementById('resume-session-btn');
    const lastPage = localStorage.getItem(lastPageKey);

    function startNewGame() {
      localStorage.removeItem('loupGarouPlayers');
      localStorage.removeItem('loupGarouRoles');
      localStorage.removeItem('loupGarouDistributionState');
      localStorage.removeItem(lastPageKey);
    }

    if (lastPage && lastPage !== 'index.html') {
      resumeButton.style.display = 'block';
      resumeButton.addEventListener('click', () => {
        window.location.href = lastPage;
      });
    }
  </script>

</body>
</html>
